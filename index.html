<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人學習歷程檔案 | 極速進化版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* === 霓虹科技風配色 === */
        :root {
            --bg-dark: #0a0c10;
            --text-main: #e2e8f0;
            --text-sub: #94a3b8;
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-green: #39ff14;
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
            --nav-height: 70px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(188, 19, 254, 0.1) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }

        h1, h2, h3, .nav-logo {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: var(--nav-height);
            background: rgba(10, 12, 16, 0.8);
            border-bottom: 1px solid var(--border-glass);
            padding: 0 5vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(15px);
        }

        .nav-logo {
            color: var(--neon-blue);
            font-size: 1.4rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: var(--text-sub);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
        }

        section {
            padding: 100px 10vw 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .section-title {
            font-size: 2rem;
            color: var(--neon-blue);
            margin-bottom: 40px;
            padding-left: 20px;
            border-left: 4px solid var(--neon-blue);
        }

        #home {
            align-items: center;
            text-align: center;
        }

        .terminal-box {
            border: 1px solid var(--neon-purple);
            padding: 50px 30px;
            background: rgba(188, 19, 254, 0.02);
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.15);
            border-radius: 4px; 
            width: 90%;
            max-width: 800px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .tech-card {
            background: var(--card-glass);
            border: 1px solid var(--border-glass);
            padding: 30px;
            border-radius: 0 20px 0 20px; 
            transition: 0.4s;
            backdrop-filter: blur(10px);
        }

        .tech-card:hover {
            border-color: var(--neon-blue);
            transform: translateY(-10px);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .tag {
            display: inline-block;
            padding: 4px 12px;
            font-size: 0.7rem;
            background: rgba(0, 242, 255, 0.1);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            border-radius: 4px;
            margin-right: 8px;
        }

        .btn-link {
            display: inline-block;
            width: 100%;
            padding: 14px 24px;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            text-decoration: none;
            border-radius: 4px;
            transition: 0.3s;
            font-weight: bold;
            text-align: center;
            background: rgba(0, 242, 255, 0.05);
        }

        .btn-link:hover {
            background: var(--neon-blue);
            color: var(--bg-dark);
            box-shadow: 0 0 25px var(--neon-blue);
        }

        .hidden { opacity: 0; transform: translateY(20px); transition: 0.8s; }
        .show { opacity: 1; transform: translateY(0); }

        footer { text-align: center; padding: 50px; color: var(--text-sub); font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">H1120124_SYS</div>
        <div class="nav-links">
            <a href="#learning">數據庫</a>
            <a href="#portfolio">核心專案</a>
        </div>
    </nav>

    <section id="home">
        <div class="terminal-box hidden">
            <span style="font-family: 'Orbitron'; color: var(--neon-green);">> SYSTEM_ONLINE_</span>
            <h1 style="margin-top: 10px;">個人學習歷程檔案</h1>
        </div>
    </section>

    <section id="learning">
        <h2 class="section-title">01. 課程數據集 / Coursework</h2>
        <div class="grid-container">
            <div class="tech-card hidden">
                <h3>自然科學探究與實作：酵母菌實驗</h3>
                <p>運用控制變因法分析數據，成功解構二氧化碳生成的動力學曲線，獲得寶貴的實作經驗。</p>
                <div class="tags" style="margin-bottom: 20px;">
                    <span class="tag">生物實驗</span> <span class="tag">變因控制</span> <span class="tag">數據記錄</span>
                </div>
                <!-- 已根據你的 GitHub 截圖路徑修正：直接使用「新增資料夾」 -->
                <a href="新增資料夾/science_report.pdf" target="_blank" class="btn-link">📄 進入專案觀看報告</a>
            </div>
            
            <div class="tech-card hidden">
                <h3>多元選修：程式設計入門</h3>
                <p>學習 Python 基礎語法，製作簡易天氣預報 Line Bot 實現在地化自動通知。</p>
                <div class="tags" style="margin-bottom: 20px;">
                    <span class="tag">Python</span> <span class="tag">API</span>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>H1120124 // TERMINAL v2.0 // EST. 2026</p>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) entry.target.classList.add('show');
            });
        }, { threshold: 0.15 });
        document.querySelectorAll('.hidden').forEach((el) => observer.observe(el));
    </script>
</body>
</html>
