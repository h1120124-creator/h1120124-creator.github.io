<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然探究與實作 - 專案詳情</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #080a10; --text-main: #e0e6ed; --cyan-glow: #00f3ff; --purple-glow: #b026ff; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; background-image: radial-gradient(circle at 50% 50%, #111827 0%, #000000 100%); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        nav { width: 100%; background: rgba(8, 10, 16, 0.9); border-bottom: 1px solid var(--cyan-glow); padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .nav-logo { font-family: 'Orbitron', sans-serif; color: var(--cyan-glow); font-size: 1.5rem; text-shadow: 0 0 10px var(--cyan-glow); }
        .btn-back { color: #000; background: var(--cyan-glow); text-decoration: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; transition: 0.3s; box-shadow: 0 0 10px var(--cyan-glow); }
        .btn-back:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        .content-container { width: 80%; max-width: 800px; margin-top: 100px; text-align: center; }
        .project-header { margin-bottom: 50px; }
        .project-header h1 { color: var(--cyan-glow); font-size: 2.5rem; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); margin-bottom: 10px; }
        .project-header p { color: #aaa; font-size: 1.1rem; }
        /* 超大按鈕設計 */
        .big-action-btn { display: inline-block; padding: 20px 40px; font-size: 1.5rem; color: var(--cyan-glow); text-decoration: none; background: rgba(0, 243, 255, 0.05); border: 2px solid var(--cyan-glow); border-radius: 10px; transition: all 0.3s ease; position: relative; overflow: hidden; font-weight: bold; }
        .big-action-btn:hover { background: var(--cyan-glow); color: #000; box-shadow: 0 0 30px var(--cyan-glow); transform: translateY(-5px); }
    </style>
</head>
<body>
    <nav>
        <div class="nav-logo">PROJECT_VIEWER</div>
        <a href="index.html" class="btn-back">⬅ 返回主系統</a>
    </nav>

    <div class="content-container">
        <div class="project-header">
            <h1>自然科學探究與實作：酵母菌發酵實驗</h1>
            <p>File Target: science_report.pdf | Status: Ready for Extraction</p>
        </div>
        
        <a href="science_report.pdf" target="_blank" class="big-action-btn">
            [ INITIALIZE_FILE ]<br>📄 點擊開啟完整實驗報告
        </a>
    </div>
</body>
</html>
